name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # Ubuntu on purpose: development happens on macOS, so CI is the only thing
    # exercising the Linux path — probes, find(1) flags and shell behaviour all
    # differ enough to break silently otherwise.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "22.x", "24.x"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # harness-kit has zero runtime dependencies, so there is nothing to install.
      - name: Unit and regression tests
        run: npm run test:unit

      - name: End-to-end selftest (generate a harness, then audit it)
        run: node skills/harness-kit/scripts/selftest.mjs

      - name: Audit this repo's own harness
        run: node skills/harness-kit/scripts/audit.mjs --target . --min-score 90
