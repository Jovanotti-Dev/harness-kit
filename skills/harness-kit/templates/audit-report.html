<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harness audit — {{PROJECT}}</title>
<style>
:root{
  --bg:#faf9f7; --surface:#fff; --ink:#1f1e1c; --soft:#5c5a55; --faint:#8b8880;
  --line:#e6e3dc; --pass:#2f6f4f; --fail:#a83e32; --warn:#8a6410;
  --accent:#d97757; --track:#eeebe4;
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#17161a; --surface:#201f24; --ink:#f2f0ec; --soft:#b3afa6; --faint:#8b8880;
    --line:#33313a; --pass:#7fc6a0; --fail:#f0928a; --warn:#e0b25e; --track:#2b2a31; }
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.wrap{max-width:900px;margin:0 auto;padding:40px 24px 64px}
header{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:4px}
h1{font-size:22px;font-weight:500;margin:0}
.meta{color:var(--faint);font-size:13px}
.score{display:flex;align-items:center;gap:20px;margin:28px 0 36px;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px 24px}
.big{font-size:44px;font-weight:500;line-height:1}
.label{font-size:15px;color:var(--soft)}
.bar{flex:1;height:10px;background:var(--track);border-radius:6px;overflow:hidden;min-width:120px}
.bar i{display:block;height:100%;background:var(--accent)}
h2{font-size:15px;font-weight:500;margin:28px 0 10px}
table{width:100%;border-collapse:collapse;background:var(--surface);
  border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-weight:500;color:var(--soft);font-size:13px;background:var(--track)}
tr:last-child td{border-bottom:none}
td.s{width:64px;white-space:nowrap;font-size:12px;font-weight:500}
.p{color:var(--pass)} .f{color:var(--fail)} .w{color:var(--warn)}
.detail{color:var(--soft);font-size:13.5px}
.fix{color:var(--ink);font-size:13.5px;margin-top:4px}
.fix b{color:var(--accent);font-weight:500}
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:8px}
.cat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.cat .n{font-size:13.5px;margin-bottom:6px}
.cat .v{font-size:12.5px;color:var(--faint);margin-bottom:8px}
footer{margin-top:40px;color:var(--faint);font-size:12.5px;border-top:1px solid var(--line);padding-top:14px}
@media(max-width:560px){ .score{flex-wrap:wrap} table{font-size:14px} }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Harness audit</h1>
  <span class="meta">{{PROJECT}} · {{GENERATED}}</span>
</header>

<div class="score">
  <div>
    <div class="big">{{SCORE}}<span style="font-size:20px;color:var(--faint)">/100</span></div>
    <div class="label">{{LABEL}}</div>
  </div>
  <div class="bar"><i style="width:{{SCORE}}%"></i></div>
</div>

<div class="cats">
{{CATEGORY_CARDS}}
</div>

{{CHECK_SECTIONS}}

<footer>
  Static analysis only — no project commands were executed.
  Generated by harness-kit.
</footer>
</div>
</body>
</html>
